name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# project link IDs (non-secret); token is a secret used per-step
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ---- CI: fail fast before any deploy ----
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Syntax-check all modules
        run: |
          for f in src/*.mjs server/*.mjs scripts/*.mjs api/*.js; do
            node --check "$f"
          done
      - name: Validate metro.json
        run: |
          node -e '
            const m = require("./data/metro.json");
            if (!m.stations || !m.lines || !m.edges) throw new Error("metro.json missing keys");
            const n = Object.keys(m.stations).length;
            if (n < 200) throw new Error("too few stations: " + n);
            console.log("metro.json OK:", n, "stations,", m.edges.length, "edges");
          '
      - name: Smoke-test route engine
        run: |
          node --input-type=module -e '
            import { buildAdjacency, findRoute } from "./src/route.mjs";
            import { readFile } from "node:fs/promises";
            const m = JSON.parse(await readFile("data/metro.json","utf8"));
            const adj = buildAdjacency(m);
            const r = findRoute(m, adj, "hauz-khas", "kashmere-gate");
            if (!r || !r.totalMin) throw new Error("route engine broken");
            console.log("route OK:", r.totalMin, "min,", r.legs.length, "leg(s)");
          '

  # ---- CD: deploy to Vercel (preview on PR, prod on push to main) ----
  deploy:
    needs: check
    runs-on: ubuntu-latest
    # don't deploy from forked-PRs (no access to secrets anyway)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Resolve environment
        id: env
        run: echo "target=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}" >> "$GITHUB_OUTPUT"
      - name: Pull Vercel config
        run: vercel pull --yes --environment=${{ steps.env.outputs.target }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed: $URL"
          echo "### Deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
