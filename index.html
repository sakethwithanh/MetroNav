<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MetroNav · ad-free Delhi Metro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body>
    <div id="map"></div>

    <!-- LEFT PANEL -->
    <aside class="panel">
      <div class="panel-head">
        <div class="brand">
          <div class="logo">
            <div class="glyph"><img src="./metro-logo.svg" alt="MetroNav" /></div>
            <div class="name">
              MetroNav
              <span>Delhi Metro · ad-free</span>
            </div>
          </div>
          <div class="brand-tools">
            <button id="themeBtn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme"></button>
          </div>
        </div>

        <div class="io-stack-wrap">
          <div class="io-stack">
            <label class="io from">
              <span class="dot"></span>
              <input id="from" autocomplete="off" placeholder="Choose starting point" />
            </label>
            <label class="io to">
              <span class="dot"></span>
              <input id="to" autocomplete="off" placeholder="Choose destination" />
            </label>
          </div>
          <button id="swapBtn" class="swap-btn" title="Reverse">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16M3 8l4-4 4 4M17 20V4M13 16l4 4 4-4"/></svg>
          </button>
          <div id="acFrom" class="ac"></div>
          <div id="acTo" class="ac"></div>
        </div>

        <div class="io-actions">
          <button id="locBtn" class="btn ghost">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
            Use my location
          </button>
          <button id="goBtn" class="btn primary">Find route</button>
        </div>
      </div>

      <div class="modes">
        <button class="mode active">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="14" rx="3"/><path d="M5 11h14M8 21l2-3M16 21l-2-3"/></svg>
          Metro
        </button>
      </div>

      <!-- dynamic results render here -->
      <div id="results">
        <div class="hint" style="margin:16px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-7.5-7-12a7 7 0 1 1 14 0c0 4.5-7 12-7 12Z"/><circle cx="12" cy="9" r="2.5"/></svg>
          <div>Enter any two places in Delhi NCR. We find your nearest stations, the fastest route, fare, and next-train estimate — then tap any station for top nearby spots.</div>
        </div>
      </div>
    </aside>

    <!-- MAP TOOLS -->
    <div class="map-tools">
      <button id="meTool" class="tool" title="Find me">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </button>
      <div class="tool-group">
        <button id="zoomIn" class="tool" aria-label="Zoom in"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
        <button id="zoomOut" class="tool" aria-label="Zoom out"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      </div>
    </div>

    <!-- STATUS PILL -->
    <div class="statusbar">
      <span class="dot"></span>
      Service running normally
      <small id="statusLines">Blue · Yellow · Violet · Pink · Magenta · Red · Green</small>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./src/app.mjs"></script>
  </body>
</html>
<!-- end -->
